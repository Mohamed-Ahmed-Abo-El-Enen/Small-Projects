version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telecom-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=XXX-XXX-XXX
      - USE_LOCAL_MODEL=false
      - OLLAMA_BASE_URL=https://esquamate-azaria-instructive.ngrok-free.dev
      - LOCAL_MODEL_NAME=qwen3:latest
      - LOCAL_VISION_MODEL_NAME=minicpm-v:latest
      - LOG_LEVEL=INFO
      - LOG_DIR=logs
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./tmp_data:/app/tmp_data
    restart: unless-stopped
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit Frontend
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telecom-streamlit
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=XXX-XXX-XXX
      - USE_LOCAL_MODEL=false
      - OLLAMA_BASE_URL=https://esquamate-azaria-instructive.ngrok-free.dev
      - LOCAL_MODEL_NAME=qwen3:latest
      - LOCAL_VISION_MODEL_NAME=minicpm-v:latest
      - LOG_LEVEL=INFO
      - LOG_DIR=logs
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./tmp_data:/app/tmp_data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    command: python run_streamlit.py
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: telecom-network